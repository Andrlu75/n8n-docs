site_name: n8n Docs
site_url: https://docs.n8n.io/
site_description: Documentation for n8n, a workflow automation platform.
# Must be the docs repo for the edit page buttons to work
repo_url: https://github.com/n8n-io/n8n-docs
edit_uri: edit/main/docs/
validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: ignore
  links:
    not_found: warn
    absolute_links: relative_to_docs
    unrecognized_links: info
theme:
  name: material
  custom_dir: _overrides
  favicon: _images/favicon.ico
  font: false
  language: custom
  logo: _images/n8n-docs-icon.svg
  palette:
    scheme: light
  features:
    # Reduced feature set for faster builds
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
copyright: >
  <a href="#__consent">Change cookie settings</a>
extra:
  analytics:
    provider: google
    property: G-0SC4FF2FH9
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page wasn't helpful
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            submitting an issue or a fix in our <a href="https://github.com/n8n-io/n8n-docs" target="_blank" rel="noopener">GitHub repo</a>.
  status:
    beta: This feature is in beta
# Minified CSS
extra_css:
  - _extra/css/extra.css
  - _extra/css/macro-styles.css
  - _extra/css/templates-widget.css
  - _extra/css/workflow-demo.css
  - _extra/css/feedback.css
# Minimal JavaScript
extra_javascript:
  - _extra/javascript/extra.js
watch:
  - _glossary
  - _snippets
# Optimized markdown extensions
markdown_extensions:
  - abbr
  - attr_list
  - md_in_html
  - meta
  # Simplified admonitions
  - pymdownx.blocks.admonition:
      types:
        - note
        - info
        - tip
        - warning
        - danger
        - details
  - pymdownx.details
  # Optimized emoji processing
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Faster code highlighting
  - pymdownx.highlight:
      linenums: false
      auto_title: false
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  # Optimized snippets
  - pymdownx.snippets:
      auto_append:
        - _glossary/main.md
      check_paths: true
  # Optimized superfences
  - pymdownx.superfences:
      preserve_tabs: false
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - sane_lists
  - tables
  - toc:
      permalink: "#"
      baselevel: 1
plugins:
  # Essential plugins only
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  # Optimized exclusions
  - exclude:
      glob:
        - "**/.*"
        - "**/*.tmp"
  # Optimized lightbox
  - glightbox:
      touchNavigation: false
      loop: false
      effect: none
      slide_effect: none
      width: auto
      height: auto
      zoomable: false
      draggable: false
      auto_caption: false
      caption_position: bottom
  # Optimized macros
  - macros:
      include_yaml:
        - _yaml/data-functions.yml
      j2_block_start_string: "[[%"
      j2_block_end_string: "%]]"
      j2_variable_start_string: "[["
      j2_variable_end_string: "]]"
      # Cache macro results
      on_error_fail: false
      on_undefined: 'keep'
  # Simplified tags
  - tags:
      enabled: true
      tags_file: null
  # Optimized privacy plugin
  - privacy:
      assets: false
      links: true
      links_attr_map:
        target: _blank
        rel: external
INHERIT: ./nav.yml